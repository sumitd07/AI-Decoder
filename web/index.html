<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decoder — a decoder ring for the language of AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
<style>
  :root{
    --font-fallback:"Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --font-primary:"Inter",var(--font-fallback);
    --font-secondary:"Newsreader",var(--font-fallback);
    --font-body:var(--font-primary);
  }
  html,body{margin:0;padding:0}
  body{background:#fdfdfc;font-family:var(--font-body);-webkit-font-smoothing:antialiased;letter-spacing:-.006em}
  *{box-sizing:border-box}
  a{color:var(--accent);text-decoration:none;cursor:pointer}
  a:hover{opacity:.72}
  button{font-family:inherit;color:inherit}
  :focus-visible{outline:2px solid rgba(79,119,166,.45);outline-offset:2px}
  .dsp{font-family:var(--font-secondary)}

  @keyframes bd{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
  @keyframes sl{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes rise{from{opacity:0;transform:translate(-50%,8px) scale(.96)}to{opacity:1;transform:translate(-50%,0) scale(1)}}
  @keyframes toastin{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
  @keyframes cardin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(240,150,55,0)}50%{box-shadow:0 0 0 4px rgba(240,150,55,.18)}}
  @keyframes savepop{0%{transform:scale(.4);opacity:0}55%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}
  @keyframes heroin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .card{position:relative;animation:cardin .5s cubic-bezier(.2,.75,.3,1) both;transition:transform .18s cubic-bezier(.2,.75,.3,1),box-shadow .18s,border-color .18s}
  .card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(20,24,33,.06);border-color:var(--border-strong)}
  .card .go{position:absolute;right:16px;bottom:15px;opacity:0;transform:translateX(-5px);transition:opacity .2s,transform .2s;color:var(--accent);font-size:16px}
  .card:hover .go{opacity:1;transform:translateX(0)}
  .srow{transition:background .13s,padding-left .13s}
  .srow:hover{padding-left:22px}
  .pulse{animation:glow 2.6s ease-in-out infinite;border-radius:20px}
  .mstack>*{animation:sl .5s cubic-bezier(.2,.75,.3,1) both}
  .mstack>*:nth-child(1){animation-delay:.04s}
  .mstack>*:nth-child(2){animation-delay:.1s}
  .mstack>*:nth-child(3){animation-delay:.16s}
  .mstack.still>*{animation:none}
  #lensLine{transition:opacity .18s ease}
  .hero-line{animation:heroin .6s cubic-bezier(.2,.75,.3,1) both}
  .tabu{transition:transform .32s cubic-bezier(.4,1.1,.3,1)}
  .savepop{display:inline-block;animation:savepop .4s cubic-bezier(.3,1.3,.4,1) both}

  /* hover helpers (converted from prototype style-hover attrs) */
  .h-bd:hover{border-color:var(--border-strong)}
  .h-theme:hover{border-color:var(--border-strong);color:var(--text-2)}
  .h-hero:hover{box-shadow:0 4px 16px rgba(20,24,33,0.09);border-color:var(--border-strong)}
  .h-close:hover{background:var(--hover)}
  .h-surf2:hover{background:var(--surface-2)}
  .h-surf3:hover{background:var(--surface-3)}
  .rel:hover{border-color:var(--border-3);background:var(--hover-strong)}
  .jterm{border-bottom:var(--hint-border);cursor:pointer;border-radius:2px;transition:background .12s}
  .jterm:hover{background:var(--hover)}
  .popclose:hover{color:var(--muted-2)}
  .rm:hover{color:var(--error)}

  .dm-shell{
    --bg:#fdfdfc;--surface:#ffffff;--surface-2:#fbfbfc;--surface-3:#f7f7f8;--hover:#eef1f6;--hover-strong:#ebecef;--header-bg:rgba(253,253,252,0.82);
    --text:#0e0f12;--text-2:#22252b;--text-3:#3f4249;--text-4:#4a4e55;--muted:#6a6e75;--muted-2:#787c83;--faint:#9a9ea5;--faint-2:#c6c9ce;
    --border:rgba(20,24,33,0.10);--border-2:rgba(20,24,33,0.14);--border-3:rgba(20,24,33,0.18);--border-strong:rgba(20,24,33,0.30);--hairline:rgba(20,24,33,0.06);--hairline-2:rgba(20,24,33,0.08);
    --save-text:#4a7c59;--toast-bg:#17181b;--toast-text:#ffffff;--error:#ff0052;--secondary:#f09637;
    --hint-border:1px dotted rgba(20,24,33,.38);
    transition:background .3s ease,color .3s ease;
  }
  .dm-shell[data-theme="dark"]{
    --bg:#131519;--surface:#1c1f25;--surface-2:#191c21;--surface-3:#23272e;--hover:#2b3038;--hover-strong:#333944;--header-bg:rgba(19,21,25,0.82);
    --text:#f4f5f7;--text-2:#e6e8ec;--text-3:#c6cad1;--text-4:#b2b7bf;--muted:#969ba3;--muted-2:#858a92;--faint:#6d727a;--faint-2:#565b63;
    --border:rgba(255,255,255,0.12);--border-2:rgba(255,255,255,0.17);--border-3:rgba(255,255,255,0.22);--border-strong:rgba(255,255,255,0.34);--hairline:rgba(255,255,255,0.07);--hairline-2:rgba(255,255,255,0.10);
    --save-text:oklch(0.82 0.1 150);--toast-bg:#f4f5f7;--toast-text:#131519;
    --hint-border:1px dotted rgba(255,255,255,.42);
  }
  .dm-shell[data-theme="dark"] .card:hover{box-shadow:0 6px 20px rgba(0,0,0,.35)}

  /* status colors — swap purely via CSS on theme change */
  .st-core{--stc:oklch(0.5 0.085 155);--stbg:oklch(0.955 0.03 155)}
  .st-rising{--stc:oklch(0.56 0.12 55);--stbg:oklch(0.955 0.05 72)}
  .st-fading{--stc:oklch(0.55 0.05 250);--stbg:oklch(0.955 0.022 250)}
  .st-historical{--stc:oklch(0.5 0 0);--stbg:oklch(0.925 0 0)}
  [data-theme="dark"] .st-core{--stc:oklch(0.82 0.11 155);--stbg:oklch(0.33 0.05 155)}
  [data-theme="dark"] .st-rising{--stc:oklch(0.83 0.12 68);--stbg:oklch(0.35 0.06 60)}
  [data-theme="dark"] .st-fading{--stc:oklch(0.82 0.07 250);--stbg:oklch(0.33 0.04 250)}
  [data-theme="dark"] .st-historical{--stc:oklch(0.78 0 0);--stbg:oklch(0.34 0 0)}
  .badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-primary);font-weight:600;text-transform:uppercase;border-radius:20px;color:var(--stc);background:var(--stbg)}

  .savebtn{border:1px solid var(--accent);border-radius:10px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;background:var(--accent);color:#fff;display:inline-flex;align-items:center;gap:8px;transition:background .2s,color .2s,border-color .2s}
  .savebtn.is-saved{background:#eef4ee;color:#4a7c59;border-color:#cfe0cf}
  [data-theme="dark"] .savebtn.is-saved{background:oklch(0.30 0.045 150);color:oklch(0.85 0.1 150);border-color:oklch(0.42 0.05 150)}

  ::selection{background:var(--hover);color:var(--text)}

  /* ---------- polish pass (Emil): press feedback, interruptible collapse, touch/reduced-motion ---------- */
  button{ -webkit-tap-highlight-color:transparent; }
  button:active{ transform:scale(0.98); }
  /* "Go deeper" accordion — height animated via the Web Animations API (see toggleDeeper), fade via CSS */
  .deeper-wrap{ height:0; overflow:hidden; }
  .deeper-inner{ min-height:0; transition:opacity .18s ease; }
  /* Gate hover states to real pointers so taps don't leave sticky states on touch devices */
  @media (hover:none){
    .card:hover{ transform:none; box-shadow:none; border-color:var(--border); }
    .card:hover .go{ opacity:0; }
    .srow:hover{ padding-left:16px; background:transparent; }
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.05s !important; }
  }

  /* ---------- responsive / mobile ---------- */
  @media (max-width:640px){
    .hdr-inner{ gap:8px !important; padding:0 14px !important; }
    .hdr-tag{ display:none !important; }
    #searchBtn{ min-width:0 !important; padding:8px 10px !important; }
    #searchBtn .search-label, #searchBtn .search-kbd{ display:none !important; }
    #main{ padding:0 14px !important; }
    .hero-pad{ padding:44px 0 44px !important; }
    .shelf-grid{ grid-template-columns:1fr !important; }
    nav#tabs button{ padding:10px 9px 12px !important; }
    #themeBtn{ width:40px !important; height:40px !important; }
    .auth-email, .auth-signout-word, .auth-dot, .auth-signin-word{ display:none !important; }
    .auth-btn{ padding:8px !important; }
    .modal-card{ border-radius:16px 16px 0 0 !important; }
    .modal-pad{ padding:22px 18px 20px !important; }
    .sheet-pad{ padding:44px 0 64px !important; }
  }
  @media (max-width:380px){
    nav#tabs button span:first-child{ font-size:12.5px !important; }
  }
</style>

<body>
<div class="dm-shell" id="shell" data-theme="light" style="--accent:#4f77a6;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);color:var(--text)">

  <header style="position:sticky;top:0;z-index:20;background:var(--header-bg);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)">
    <div class="hdr-inner" style="max-width:1040px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:20px">

        <span style="width:9px;height:9px;border-radius:50%;background:var(--accent);display:inline-block"></span>
        <span class="dsp" style="font-weight:600;font-size:22px;line-height:1;letter-spacing:-.02em">Decoder</span>
        <span class="hdr-tag" style="font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)">for AI</span>
      </div>
      <nav id="tabs" style="display:flex;gap:2px"></nav>
      <button id="searchBtn" class="h-bd" aria-label="Search a term" style="margin-left:auto;display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border-2);border-radius:10px;padding:7px 10px 7px 12px;cursor:pointer;color:var(--muted-2);font-size:13px;min-width:210px;transition:border-color .15s">
        <span style="color:var(--accent);font-size:15px">⌕</span>
        <span class="search-label" style="opacity:.7">Search a term…</span>
        <span class="search-kbd" style="margin-left:auto;font-family:var(--font-primary);font-size:10.5px;color:var(--faint);border:1px solid var(--border-2);border-radius:5px;padding:1px 6px">⌘K</span>
      </button>
      <button id="themeBtn" class="h-theme" title="Switch to dark" aria-label="Switch to dark" style="flex:none;display:flex;align-items:center;justify-content:center;width:34px;height:34px;background:var(--surface);border:1px solid var(--border-2);border-radius:10px;cursor:pointer;color:var(--muted);font-size:15px;line-height:1;transition:border-color .15s,color .15s">☾</button>

  <!-- overlay roots live INSIDE the shell so they inherit theme + accent CSS variables -->

<!-- Cloud bridge: sets up Supabase (if configured) and talks to the app via events. -->
<script type="module">
  const cfg = window.DECODER_CONFIG || {};
  function emit(detail){ window.dispatchEvent(new CustomEvent("decoder-auth", { detail })); }
  if (!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY) {
    window.__decoderConfigured = false;
    emit({ configured: false });
  } else {
    window.__decoderConfigured = true;
    const { createClient } = await import("https://esm.sh/@supabase/supabase-js@2");
    const sb = createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
    const api = {
      signIn: () => sb.auth.signInWithOAuth({ provider: "google", options: { redirectTo: location.href.split("#")[0] } }),
      signOut: () => sb.auth.signOut(),
      async list() {
        const { data, error } = await sb.from("saved terms_items").select("concept_id");
        if (error) { console.warn("[decoder] list failed", error.message); return []; }
        return data.map(r => r.concept_id);
      },
      async add(uid, id) { await sb.from("saved terms_items").upsert({ user_id: uid, concept_id: id }); },
      async remove(id) { await sb.from("saved terms_items").delete().eq("concept_id", id); },
    };
    window.__decoderCloud = api;
    sb.auth.onAuthStateChange((_evt, session) => {
      emit({ configured: true, user: session ? { id: session.user.id, email: session.user.email } : null, api });
    });
    const { data: { session } } = await sb.auth.getSession();
    emit({ configured: true, user: session ? { id: session.user.id, email: session.user.email } : null, api });
  }
</script>

<script>
"use strict";
const ACCENT = "#4f77a6";
const SHOW_HINTS = true;

const statusMeta = {
  Core:       { label:"Core",       sym:"●", cls:"st-core" },
  Rising:     { label:"Rising",     sym:"▲", cls:"st-rising" },
  Fading:     { label:"Fading",     sym:"▼", cls:"st-fading" },
  Historical: { label:"Historical", sym:"†", cls:"st-historical" },
};

const DATA = window.DECODER_CONCEPTS || [];

// Alternate one-liners per audience. Default ("curious") uses each concept's own oneLiner.
const LENSES = window.DECODER_LENSES || {};

const state = { tab:'lookup', spotlightOpen:false, query:'', selIndex:0, openId:null, deeperOpen:false, saved:[], sel:null, selSaved:false, dark:false, lens:'curious', remoteResults:[] };
let toastTimer = null;
try { const L = localStorage.getItem('decoder.lens.v1'); if (['curious','pm','eng'].includes(L)) state.lens = L; } catch (e) {}

// persist the saved terms across reloads (graceful if storage is unavailable)
const STORE_KEY = 'decoder.saved.v1';
try {
  const s = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
  if (Array.isArray(s)) state.saved = s.filter(id => DATA.some(c => c.id === id));
} catch (e) { /* storage blocked — run in-memory */ }
function persist(){ if (cloud.user) return; try { localStorage.setItem(STORE_KEY, JSON.stringify(state.saved)); } catch (e) {} }

// ---- cloud / auth (Supabase, optional) ----
const cloud = { configured: false, user: null, api: null };
window.addEventListener("decoder-auth", async e => {
  const d = e.detail || {};
  cloud.configured = !!d.configured;
  cloud.api = d.api || cloud.api;
  const wasSignedIn = !!cloud.user;
  cloud.user = d.user || null;
  renderAuth();
  if (cloud.user && cloud.api) {
    closeSignin();
    // On sign-in, merge any local saves up, then load the cloud set as source of truth.
    const local = state.saved.slice();
    let remote = await cloud.api.list();
    const toUpload = local.filter(id => !remote.includes(id));
    if (toUpload.length) { await Promise.all(toUpload.map(id => cloud.api.add(cloud.user.id, id))); remote = remote.concat(toUpload); }
    state.saved = remote.filter(id => DATA.some(c => c.id === id));
    try { localStorage.removeItem(STORE_KEY); } catch (e2) {}
    renderTabs(); renderLookup(); updateGridFlags(); if (state.tab === 'sheet') renderSheet(); renderModal(false);
  } else if (wasSignedIn && !cloud.user) {
    // Signed out — clear the in-memory saved terms and re-gate the UI.
    state.saved = [];
    renderTabs(); renderLookup(); updateGridFlags(); if (state.tab === 'sheet') renderSheet();
  } else {
    // Config resolved while logged out — make sure gated UI (shelf CTA) reflects it.
    renderLookup();
  }
});
function isSignedIn(){ return !!cloud.user; }
function doSignIn(){ if (cloud.api) cloud.api.signIn(); else showToast('Sign-in isn’t connected yet — see SETUP.md'); }
// mirror a save/remove into the cloud when signed in (fire-and-forget)
function cloudSync(id, added){
  if (!cloud.user || !cloud.api) return;
  (added ? cloud.api.add(cloud.user.id, id) : cloud.api.remove(id)).catch(e => console.warn("[decoder] sync failed", e));
}
const GOOGLE_G = `<svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true" style="flex:none"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.76h3.56c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.56-2.76c-.98.66-2.24 1.06-3.72 1.06-2.86 0-5.28-1.93-6.15-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.85 14.11a6.6 6.6 0 0 1 0-4.22V7.05H2.18a11 11 0 0 0 0 9.9l3.67-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.05l3.67 2.84C6.72 7.3 9.14 5.38 12 5.38z"/></svg>`;
function renderAuth(){
  const slot = document.getElementById("authSlot");
  if (!slot) return;
  if (cloud.user) {
    const email = cloud.user.email || "Signed in";
    const initial = (email[0] || "?").toUpperCase();
    slot.innerHTML = `<button data-signout title="Sign out (${email})" class="h-bd auth-btn" style="display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border-2);border-radius:10px;padding:5px 10px 5px 6px;cursor:pointer;color:var(--muted-2);font-size:12.5px;transition:border-color .15s">
      <span style="width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex:none">${initial}</span>
      <span class="auth-email" style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${email}</span>
      <span class="auth-dot" style="color:var(--faint)">·</span><span class="auth-signout-word">Sign out</span>
    </button>`;
  } else {
    slot.innerHTML = `<button data-signin class="h-bd auth-btn" aria-label="Sign in with Google" style="display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border-2);border-radius:10px;padding:7px 12px;cursor:pointer;color:var(--text-2);font-size:13px;font-weight:500;transition:border-color .15s">
      ${GOOGLE_G}<span class="auth-signin-word">Sign in with Google</span>
    </button>`;
  }
}

/* ---------- sign-in prompt (shown when a logged-out user tries to save) ---------- */
function openSignin(){
  const root = document.getElementById("signinRoot");
  if (!root) return;
  root.innerHTML = `
    <div data-backdrop="signin" style="position:fixed;inset:0;z-index:75;background:rgba(28,25,20,0.40);backdrop-filter:blur(6px);display:flex;justify-content:center;align-items:center;padding:20px;animation:bd .16s ease">
      <div class="modal-card" role="dialog" aria-modal="true" aria-label="Sign in to save" style="width:min(400px,100%);background:var(--surface);border-radius:16px;box-shadow:0 20px 56px rgba(20,18,14,0.24);animation:pop .2s cubic-bezier(.23,1,.32,1);overflow:hidden">
        <div class="modal-pad" style="padding:30px 28px 26px;text-align:center">
          <div style="width:44px;height:44px;border-radius:12px;background:var(--surface-3);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:20px">🔖</div>
          <h2 class="dsp" style="font-weight:600;font-size:24px;line-height:1.1;letter-spacing:-.02em;margin:0 0 8px">Save this for later</h2>
          <p style="font-size:14.5px;line-height:1.55;color:var(--text-3);margin:0 0 22px">Sign in to save terms and reach your saved terms on any device.</p>
          <button data-signin style="width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--accent);color:#fff;border:none;border-radius:11px;padding:13px;font-size:14.5px;font-weight:600;cursor:pointer">${GOOGLE_G_WHITE}<span>Sign in with Google</span></button>
          <button data-close-signin style="margin-top:10px;background:none;border:none;cursor:pointer;color:var(--muted-2);font-size:13px;padding:8px">Maybe later</button>
        </div>
      </div>
    </div>`;
}

function requireAuth(){ openSignin(); }

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function find(id){ return DATA.find(c => c.id === id); }
function norm(s){ return (s||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
function match(text){ const n = norm(text); if(!n) return null; return DATA.find(c => c.aliasList.some(a => norm(a) === n)) || null; }
function getResults(){
  const q = state.query.trim().toLowerCase();
  if(!q) return DATA;
  const local = DATA.filter(c => (c.term+' '+c.aliases+' '+c.said+' '+c.oneLiner+' '+c.aliasList.join(' ')).toLowerCase().includes(q));
  const localIds = new Set(local.map(c=>c.id));
  const remote = (state.remoteResults||[]).filter(c => !localIds.has(c.id));
  return local.concat(remote);
}

/* ---------- long-tail remote search (web-only; DB terms outside the static bundle) ---------- */
const REMOTE = { url:(window.DECODER_CONFIG||{}).SUPABASE_URL, key:(window.DECODER_CONFIG||{}).SUPABASE_ANON_KEY };
const remoteCache = new Map();
function rowToConcept(r){ return { id:r.id, term:r.term, aliases:r.aliases||'', said:r.said||'', aliasList:r.alias_list||[], status:r.status||'Core', oneLiner:r.one_liner||'', analogy:r.analogy||'', example:r.example||'', related:r.related||[], deeper:r.deeper||'' }; }
async function rpc(fn, body){
  if(!REMOTE.url || !REMOTE.key) return null;
  try{
    const res = await fetch(REMOTE.url+'/rest/v1/rpc/'+fn, { method:'POST', headers:{ 'Content-Type':'application/json', apikey:REMOTE.key, Authorization:'Bearer '+REMOTE.key }, body:JSON.stringify(body) });
    if(!res.ok) return null;
    return await res.json();
  }catch(e){ return null; }
}
let remoteSeq = 0, remoteTimer = null;
function scheduleRemoteSearch(){
  clearTimeout(remoteTimer);
  const q = state.query.trim();
  if(q.length < 2){ state.remoteResults = []; return; }
  remoteTimer = setTimeout(async () => {
    const my = ++remoteSeq;
    const rows = await rpc('search_concepts', { q, lim:20 });
    if(my !== remoteSeq || !rows) return;
    const known = new Set(DATA.map(c=>c.id));
    state.remoteResults = rows.filter(r=>!known.has(r.id)).map(r=>({ id:r.id, term:r.term, aliases:r.aliases||'', said:'', status:r.status||'Core', oneLiner:r.one_liner||'', aliasList:[] }));
    if(state.spotlightOpen) renderSpotResults();
  }, 180);
}
async function ensureConcept(id){
  if(find(id) && find(id).deeper) return find(id);
  if(remoteCache.has(id)) return remoteCache.get(id);
  const rows = await rpc('get_concept', { concept_id:id });
  if(rows && rows[0]){
    const c = rowToConcept(rows[0]); remoteCache.set(id, c); DATA.push(c);
    if(rows[0].lens_pm || rows[0].lens_eng) LENSES[id] = { pm:rows[0].lens_pm||'', eng:rows[0].lens_eng||'' };
    return c;
  }
  return null;
}
async function openRow(id){ if(!find(id) || !find(id).deeper){ await ensureConcept(id); } openCard(id); }

/* Load the whole shelf from the DB on startup; static concepts.js stays as offline fallback. */
async function loadShelfFromDB(){
  if(!REMOTE.url || !REMOTE.key) return;
  const cols = 'id,term,aliases,said,alias_list,status,one_liner,analogy,example,related,deeper,lens_pm,lens_eng';
  const all = [];
  try{
    for(let offset=0; offset<20000; offset+=1000){
      const res = await fetch(REMOTE.url+'/rest/v1/concepts?is_published=eq.true&select='+cols+'&order=priority.desc,term.asc&limit=1000&offset='+offset+'&_cb='+Date.now(), { cache:'no-store', headers:{ apikey:REMOTE.key, Authorization:'Bearer '+REMOTE.key } });
      if(!res.ok) return; // keep static fallback
      const rows = await res.json();
      all.push(...rows);
      if(rows.length < 1000) break;
    }
  }catch(e){ return; }
  if(!all.length) return;
  DATA.length = 0;
  for(const r of all){
    DATA.push(rowToConcept(r));
    if(r.lens_pm || r.lens_eng) LENSES[r.id] = { pm:r.lens_pm||'', eng:r.lens_eng||'' };
  }
  renderLookup(); renderSheet();
  $("#s-lookup").style.display = state.tab==='lookup' ? '' : 'none';
}

function isSaved(id){ return state.saved.includes(id); }

  root.innerHTML = `
    <div data-backdrop="modal" style="position:fixed;inset:0;z-index:70;background:rgba(28,25,20,0.40);backdrop-filter:blur(6px);display:flex;justify-content:center;align-items:flex-start;padding:7vh 20px 24px;overflow-y:auto;scrollbar-gutter:stable;animation:bd .16s ease">
      <div class="modal-card" role="dialog" aria-modal="true" aria-label="${esc(c.term)} — definition" style="width:min(580px,100%);background:var(--surface);border-radius:16px;box-shadow:0 20px 56px rgba(20,18,14,0.24);animation:${animate?'pop .22s cubic-bezier(.23,1,.32,1)':'none'};overflow:hidden">
        <div class="modal-pad" style="padding:26px 28px 24px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
            <span class="badge ${m.cls}" style="font-size:10px;letter-spacing:.06em;padding:4px 9px"><span>${m.sym}</span><span>${m.label}</span></span>
            ${saidBit}
            <button data-close-modal style="margin-left:auto;background:none;border:1px solid var(--border-2);border-radius:8px;width:30px;height:30px;cursor:pointer;color:var(--muted-2);font-size:16px;line-height:1" class="h-close">×</button>
          </div>
          <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px">
            <h2 class="dsp" style="font-weight:600;font-size:33px;line-height:1.02;letter-spacing:-.03em;margin:0">${esc(c.term)}</h2>
            ${aliasBit}
          </div>
          ${lensCtl}
          <p id="lensLine" style="font-family:var(--font-primary);font-weight:500;font-size:19px;line-height:1.5;color:var(--text-2);margin:0 0 22px">${esc(lensLine)}</p>
          <div class="mstack${animate?'':' still'}" style="display:flex;flex-direction:column;gap:16px">
            <div>
              <div style="font-family:var(--font-primary);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:5px">It's like</div>
              <p style="margin:0;font-size:15px;line-height:1.55;color:var(--text-3);font-style:italic">${esc(c.analogy)}</p>
            </div>
            <div>
              <div style="font-family:var(--font-primary);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:5px">Example</div>
              <p style="margin:0;font-size:15px;line-height:1.55;color:var(--text-3)">${esc(c.example)}</p>
            </div>
            <div>
              <div style="font-family:var(--font-primary);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:7px">Related</div>
              <div style="display:flex;flex-direction:column;gap:6px">${related}</div>
            </div>
          </div>
        </div>
        <div style="border-top:1px solid var(--hairline-2)">
          <button data-deeper style="width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:15px 28px;display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:500;color:var(--text-3)" class="h-surf2">
            <span style="font-family:var(--font-primary);font-size:11px;color:var(--accent)">${state.deeperOpen?'−':'+'}</span>
            <span>${state.deeperOpen?'Hide details':'Go deeper'}</span>
            <span style="margin-left:auto;font-size:11px;color:var(--faint)">the technical version</span>
          </button>
          ${deeperBlock}
        </div>
        <div style="border-top:1px solid var(--hairline-2);padding:16px 28px;display:flex;align-items:center;gap:12px;background:var(--surface-2)">
          <button data-savemodal class="savebtn ${signed&&saved?'is-saved':''}">${signed&&saved?'<span class="savepop">✓</span>':''}<span>${!signed?'Sign in to save':(saved?'Remove':'Save')}</span></button>
          <span style="font-size:12.5px;color:var(--faint);line-height:1.4">${!signed?'Your saved terms sync to your account.':(saved?'Its status updates as the field changes.':'Keeps the terms you looked up in one place.')}</span>
        </div>
      </div>
    </div>`;
}

/* ---------- select-to-explain popover ---------- */
function renderPopover(){
  const root = $("#popRoot");
  if(!state.sel){ root.innerHTML = ''; return; }
  const c = find(state.sel.id); const m = meta(c);
  const savedNow = isSaved(c.id) || state.selSaved;
  const saveRow = savedNow
    ? `<button data-removepop class="h-surf3" style="flex:1;background:none;border:none;cursor:pointer;padding:10px;font-size:12.5px;font-weight:600;color:var(--save-text)"><span class="savepop">✓</span> Saved · remove</button>`
    : `<button data-savepop class="h-surf3" style="flex:1;background:none;border:none;cursor:pointer;padding:10px;font-size:12.5px;font-weight:500;color:var(--accent)">＋ Save</button>`;
  root.innerHTML = `
    <div style="position:fixed;z-index:65;left:${state.sel.x}px;top:${state.sel.y}px;transform:translateX(-50%);width:300px;max-width:calc(100vw - 24px);background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 36px rgba(20,18,14,0.18);animation:rise .16s ease;overflow:hidden">
      <div style="padding:13px 15px 12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span class="badge ${m.cls}" style="font-size:9px;letter-spacing:.05em;padding:2px 7px"><span>${m.sym}</span><span>${m.label}</span></span>
          <span class="dsp" style="font-weight:600;font-size:16px;line-height:1.1;letter-spacing:-.01em">${esc(c.term)}</span>
          <button data-closepop class="popclose" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--faint-2);font-size:15px;line-height:1;padding:2px">×</button>
        </div>
        <p style="margin:0 0 8px;font-size:13.5px;line-height:1.5;color:var(--text-2)">${esc(c.oneLiner)}</p>
        <p style="margin:0 0 6px;font-size:12.5px;line-height:1.5;color:var(--text-4);font-style:italic">${esc(c.analogy)}</p>
        <p style="margin:0;font-size:12px;line-height:1.5;color:var(--muted-2)">${esc(c.example)}</p>
      </div>
      <div style="border-top:1px solid var(--hairline-2);display:flex">
        ${saveRow}
        <button data-openfull class="h-surf3" style="flex:none;background:none;border:none;border-left:1px solid var(--hairline-2);cursor:pointer;padding:10px 14px;font-size:12.5px;color:var(--text-4)">Full card →</button>
      </div>
    </div>`;
}

/* ---------- toast ---------- */
function showToast(msg){
  state.toast = msg;
  $("#toastRoot").innerHTML = `<div style="position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:80;background:var(--toast-bg);color:var(--toast-text);font-size:13px;font-weight:500;padding:10px 18px;border-radius:24px;box-shadow:0 8px 28px rgba(20,18,14,0.3);animation:toastin .2s ease">${esc(msg)}</div>`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { state.toast = null; $("#toastRoot").innerHTML = ''; }, 1900);
}

/* ---------- actions ---------- */
function setTab(t){
  state.tab = t; state.spotlightOpen = false; state.openId = null; state.sel = null;
  $("#s-lookup").style.display = t==='lookup' ? '' : 'none';
  $("#s-sheet").style.display  = t==='sheet'  ? '' : 'none';
  if(t==='sheet') renderSheet();
  renderTabs(); renderSpotlight(); renderModal(false); renderPopover();
}
function openSpotlight(){ state.spotlightOpen = true; state.query = ''; state.selIndex = 0; state.remoteResults = []; renderSpotlight(); }
function toggleSpotlight(){ state.spotlightOpen ? (state.spotlightOpen=false, renderSpotlight()) : openSpotlight(); }
function escapeAll(){ state.spotlightOpen=false; state.openId=null; state.sel=null; renderSpotlight(); renderModal(false); renderPopover(); closeSignin(); }

function openCard(id){ state.openId = id; state.deeperOpen = false; state.spotlightOpen = false; state.sel = null; renderSpotlight(); renderPopover(); renderModal(true); }
function closeCard(){ state.openId = null; renderModal(false); }
function toggleDeeper(){
  state.deeperOpen = !state.deeperOpen;
  const isOpen = state.deeperOpen;
  const wrap = document.querySelector('#modalRoot .deeper-wrap');
  const inner = wrap && wrap.querySelector('.deeper-inner');
  const btn = document.querySelector('#modalRoot [data-deeper]');
  if(btn){
    const spans = btn.querySelectorAll('span');
    if(spans[0]) spans[0].textContent = isOpen ? '−' : '+';
    if(spans[1]) spans[1].textContent = isOpen ? 'Hide details' : 'Go deeper';
  }
  if(!wrap || !inner) return;
  inner.style.opacity = isOpen ? '1' : '0';          // CSS-transition fade
  const start = wrap.getBoundingClientRect().height; // visual height (mid-anim if interrupted)
  if(wrap._anim) wrap._anim.cancel();
  wrap.style.height = 'auto';
  const full = wrap.getBoundingClientRect().height;  // measure target
  wrap.style.height = isOpen ? 'auto' : '0';         // rest value the element settles to
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduce) return;
  // Animate only the height, from the current visual height to the target. Interruptible, no fill
  // (so it settles to the inline rest value above with no snap).
  const anim = wrap.animate(
    [{ height: start + 'px' }, { height: (isOpen ? full : 0) + 'px' }],
    { duration: isOpen ? 260 : 190, easing: 'cubic-bezier(.32,.72,0,1)' }
  );
  wrap._anim = anim;
  anim.onfinish = anim.oncancel = () => { if(wrap._anim === anim) wrap._anim = null; };
}
let lensTimer = null;
function setLens(k){
  if(state.lens === k) return;
  state.lens = k;
  try { localStorage.setItem('decoder.lens.v1', k); } catch (e) {}
  // patch in place — no modal rebuild, so nothing flickers
  document.querySelectorAll('#modalRoot [data-lens]').forEach(b => b.setAttribute('style', lensBtnStyle(b.getAttribute('data-lens') === k)));
  const p = document.getElementById('lensLine');
  if(p && state.openId){
    const line = lensLineFor(find(state.openId), k);
    p.style.opacity = '0';
    clearTimeout(lensTimer);
    lensTimer = setTimeout(() => { p.textContent = line; p.style.opacity = '1'; }, 140);
  }
}

function updateGridFlags(){
  document.querySelectorAll('[data-flag]').forEach(el => {
    if(!isSignedIn()){ el.style.display='none'; return; }
    el.style.display = isSaved(el.getAttribute('data-flag')) ? 'inline' : 'none';
  });
}
function afterSaveChange(){ persist(); renderTabs(); updateGridFlags(); if(state.tab==='sheet') renderSheet(); renderModal(false); renderPopover(); }

function toggleSave(id){
  if(!id) return;
  if(!isSignedIn()){ requireAuth(); return; }
  const has = isSaved(id);
  state.saved = has ? state.saved.filter(x => x !== id) : [...state.saved, id];
  cloudSync(id, !has);
  showToast(has ? 'Removed' : 'Saved');
  afterSaveChange();
}

function closePopover(){ state.sel = null; renderPopover(); }
function savePopover(){
  const id = state.sel && state.sel.id; if(!id) return;
  if(!isSignedIn()){ requireAuth(); return; }
  if(!isSaved(id)){ state.saved = [...state.saved, id]; cloudSync(id, true); }
  state.selSaved = true; showToast('Saved'); afterSaveChange();
}
function removePopover(){
  const id = state.sel && state.sel.id; if(!id) return;
  state.saved = state.saved.filter(x => x !== id); cloudSync(id, false);
  state.selSaved = false; showToast('Removed'); afterSaveChange();
}
function openSelFull(){ const id = state.sel && state.sel.id; if(id) openCard(id); }

function toggleTheme(){
  state.dark = !state.dark;
  shell.setAttribute('data-theme', state.dark ? 'dark' : 'light');
  const b = $("#themeBtn");
  b.textContent = state.dark ? '☀' : '☾';
  const title = state.dark ? 'Switch to light' : 'Switch to dark';
  b.title = title; b.setAttribute('aria-label', title);
}

/* ---------- global event wiring ---------- */
function spotlightNav(e){
  const r = getResults();
  if(e.key === 'ArrowDown'){ e.preventDefault(); state.selIndex = Math.min(state.selIndex+1, Math.max(r.length-1,0)); renderSpotResults(); }
  else if(e.key === 'ArrowUp'){ e.preventDefault(); state.selIndex = Math.max(state.selIndex-1, 0); renderSpotResults(); }
  else if(e.key === 'Enter'){ e.preventDefault(); const c = r[state.selIndex] || r[0]; if(c) openRow(c.id); }
}
window.addEventListener('keydown', e => {
  const k = e.key;
  const typing = /^(input|textarea)$/i.test((e.target && e.target.tagName) || '');
  if((e.metaKey || e.ctrlKey) && (k === 'k' || k === 'K')){ e.preventDefault(); toggleSpotlight(); return; }
  if(k === 'Escape'){ escapeAll(); return; }
  if(k === '/' && !state.spotlightOpen && !typing){ e.preventDefault(); openSpotlight(); return; }
  if(state.spotlightOpen) spotlightNav(e);
});

// delegated clicks
document.addEventListener('click', e => {
  const t = e.target;
  const tabBtn = t.closest('[data-tab]'); if(tabBtn){ setTab(tabBtn.getAttribute('data-tab')); return; }
  if(t.closest('[data-openspot]')){ openSpotlight(); return; }
  const openBtn = t.closest('[data-open]'); if(openBtn){ openCard(openBtn.getAttribute('data-open')); return; }
  const rowBtn = t.closest('[data-openrow]'); if(rowBtn){ openRow(rowBtn.getAttribute('data-openrow')); return; }
  const rmBtn = t.closest('[data-remove]'); if(rmBtn){ toggleSave(rmBtn.getAttribute('data-remove')); return; }
  if(t.closest('[data-close-modal]')){ closeCard(); return; }
  if(t.closest('[data-deeper]')){ toggleDeeper(); return; }
  const lensBtn = t.closest('[data-lens]'); if(lensBtn){ setLens(lensBtn.getAttribute('data-lens')); return; }
  if(t.closest('[data-savemodal]')){ toggleSave(state.openId); return; }
  if(t.closest('[data-closepop]')){ closePopover(); return; }
  if(t.closest('[data-savepop]')){ savePopover(); return; }
  if(t.closest('[data-removepop]')){ removePopover(); return; }
  if(t.closest('[data-openfull]')){ openSelFull(); return; }
  if(t.closest('[data-close-signin]')){ closeSignin(); return; }
  if(t.closest('[data-signin]')){ doSignIn(); return; }
  if(t.closest('[data-signout]')){ cloud.api && cloud.api.signOut(); return; }
});
$("#searchBtn").addEventListener('click', openSpotlight);
$("#themeBtn").addEventListener('click', toggleTheme);
// backdrop mousedown close (matches prototype onMouseDown)
document.addEventListener('mousedown', e => {
  const bd = e.target.closest && e.target.closest('[data-backdrop]');
  if(bd && e.target === bd) escapeAll();
});
// reposition popover on scroll/resize by dismissing (keeps it anchored honestly)
window.addEventListener('scroll', () => { if(state.sel) closePopover(); }, true);

/* ---------- init ---------- */
renderTabs();
renderLookup();
renderSheet();
renderAuth();
loadShelfFromDB();
</script>
</body>
</html>
